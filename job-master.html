<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOB Master - asura Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  a { color:#ff4444; text-decoration:none; }
  a:hover { text-decoration:underline; }

  .header { display:flex; justify-content:space-between; align-items:center; padding:20px 32px; border-bottom:1px solid #222; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo { color:#ff4444; font-size:28px; font-weight:900; }
  .header h1 { font-size:22px; font-weight:600; }
  .back-link { font-size:14px; }

  .toolbar { display:flex; gap:12px; padding:20px 32px; align-items:center; flex-wrap:wrap; }
  .search-input { flex:1; min-width:200px; padding:10px 16px; background:#141414; border:1px solid #333; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none; }
  .search-input:focus { border-color:#ff4444; }
  .filter-select { padding:10px 16px; background:#141414; border:1px solid #333; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none; min-width:140px; }
  .filter-select:focus { border-color:#ff4444; }
  .btn-new { padding:10px 24px; background:#ff4444; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .btn-new:hover { background:#ee3333; }

  .content { padding:0 32px 32px; }
  .loading, .empty, .error-msg { text-align:center; padding:60px 20px; color:#888; font-size:15px; }
  .error-msg { color:#ff4444; }

  .job-list { display:flex; flex-direction:column; gap:8px; }
  .job-card { background:#141414; border-radius:10px; padding:16px 20px; display:grid; grid-template-columns:120px 1fr 140px 100px 120px 80px; align-items:center; gap:12px; cursor:pointer; border:1px solid #1e1e1e; transition:border-color .2s; }
  .job-card:hover { border-color:#333; }
  .job-code { font-family:monospace; font-size:15px; font-weight:700; color:#ff4444; }
  .job-name { font-size:14px; font-weight:500; }
  .job-client { font-size:13px; color:#999; }
  .job-person { font-size:13px; color:#999; }
  .job-dates { font-size:12px; color:#666; }

  .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
  .badge-見積中 { background:rgba(255,165,0,.15); color:#ffa500; }
  .badge-進行中 { background:rgba(68,136,255,.15); color:#4488ff; }
  .badge-完了 { background:rgba(68,187,68,.15); color:#44bb44; }
  .badge-請求済 { background:rgba(136,136,136,.15); color:#888; }
  .badge-失注 { background:rgba(255,68,68,.15); color:#ff4444; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; justify-content:center; align-items:center; }
  .modal-overlay.active { display:flex; }
  .modal { background:#1a1a1a; border-radius:14px; padding:32px; width:90%; max-width:560px; max-height:90vh; overflow-y:auto; border:1px solid #333; }
  .modal h2 { font-size:18px; margin-bottom:20px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; color:#999; margin-bottom:6px; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:10px 14px; background:#0f0f0f; border:1px solid #333; border-radius:8px; color:#e0e0e0; font-size:14px; outline:none;
  }
  .form-group textarea { height:80px; resize:vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#ff4444; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; gap:12px; margin-top:24px; }
  .btn-save { flex:1; padding:12px; background:#ff4444; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-save:hover { background:#ee3333; }
  .btn-cancel { flex:1; padding:12px; background:#333; color:#e0e0e0; border:none; border-radius:8px; font-size:14px; cursor:pointer; }
  .btn-cancel:hover { background:#444; }
  .btn-delete { padding:12px 20px; background:transparent; color:#ff4444; border:1px solid #ff4444; border-radius:8px; font-size:14px; cursor:pointer; }
  .btn-delete:hover { background:rgba(255,68,68,.1); }

  .toast { position:fixed; bottom:20px; right:20px; padding:14px 24px; border-radius:10px; font-size:14px; z-index:200; opacity:0; transition:opacity .3s; }
  .toast.show { opacity:1; }
  .toast-success { background:#1a3a1a; color:#44bb44; border:1px solid #44bb44; }
  .toast-error { background:#3a1a1a; color:#ff4444; border:1px solid #ff4444; }

  @media(max-width:900px) {
    .job-card { grid-template-columns:1fr; gap:6px; }
    .header { padding:14px 16px; }
    .logo { font-size:22px; } .header h1 { font-size:16px; }
    .toolbar { padding:12px 16px; gap:8px; }
    .search-input { min-width:100%; }
    .content { padding:0 16px 24px; }
    .modal { padding:20px; width:96%; }
    .form-row { grid-template-columns:1fr; }
  }
  @media(max-width:480px) {
    .toolbar { flex-direction:column; }
    .btn-new { width:100%; text-align:center; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">asura</span>
    <h1>JOB Master</h1>
  </div>
  <a href="index.html" class="back-link">← ポータルに戻る</a>
</div>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="JOB番号・JOB名で検索...">
  <select class="filter-select" id="statusFilter">
    <option value="">全て</option>
    <option value="見積中">見積中</option>
    <option value="進行仭">進行中</option>
    <option value="完了">完了</option>
    <option value="請求済">請求済</option>
    <option value="失注">失注</option>
  </select>
  <button class="btn-new" onclick="openCreateModal()">+ 新規JOB</button>
</div>

<div class="content">
  <div id="jobList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">新規JOB</h2>
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="form-group">
        <label>JOB番号 *</label>
        <input type="text" id="fJobCode" placeholder="例: 2603-S1a">
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="fStatus">
          <option value="見積中">見積中</option>
          <option value="進行中">進行中</option>
          <option value="完了">完了</option>
          <option value="請求済">請求済</option>
          <option value="失注">失注</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>JOB名 *</label>
      <input type="text" id="fJobName" placeholder="案件名を入力">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>クライアント</label>
        <select id="fClient"><option value="">-- 選択 --</option></select>
      </div>
      <div class="form-group">
        <label>営業担当</label>
        <select id="fSalesPerson"><option value="">-- 選択 --</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>開始日</label>
        <input type="date" id="fStartDate">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="fEndDate">
      </div>
    </div>
    <div class="form-group">
      <label>備考</label>
      <textarea id="fDescription" placeholder="メモ・備考"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveJob()">保存</button>
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteJob()">削除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ymtojnmkvypbhmeqaszm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltdG9qbm1rdnlwYmhtZXFhc3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MDI0NzIsImV4cCI6MjA4NDk3ODQ3Mn0.X88gOaFprlNrbRD14C26r-fWYu7KSGZXu9I4bC6p8CU';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allJobs = [];
let clients = [];
let staff = [];

// --- Init ---
async function init() {
  showLoading();
  try {
    const [jobsRes, clientsRes, staffRes] = await Promise.all([
      sb.from('jobs').select('*').order('created_at', { ascending: false }),
      sb.from('partners').select('id, name').eq('is_client', true),
      sb.from('staff_members').select('id, name')
    ]);

    if (jobsRes.error) throw jobsRes.error;
    if (clientsRes.error) throw clientsRes.error;
    if (staffRes.error) throw staffRes.error;

    allJobs = jobsRes.data || [];
    clients = clientsRes.data || [];
    staff = staffRes.data || [];

    populateDropdowns();
    renderJobs();
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('jobList').innerHTML =
      '<div class="error-msg">データの取得に失敗しました: ' + (e.message || e) + '</div>';
  }
}

function showLoading() {
  document.getElementById('jobList').innerHTML =
    '<div class="loading"><div style="width:40px;height:40px;border:3px solid #333;border-top-color:#ff4444;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>データを読み込み中...</div>' +
    '<style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
}

// --- Render ---
function renderJobs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;

  let filtered = allJobs.filter(j => {
    const matchSearch = !search || (j.job_code || '').toLowerCase().includes(search) || (j.title || '').toLowerCase().includes(search);
    const matchStatus = !statusF || j.status === statusF;
    return matchSearch && matchStatus;
  });

  if (filtered.length === 0) {
    document.getElementById('jobList').innerHTML = '<div class="empty">JOBが見つかりません</div>';
    return;
  }

  const html = '<div class="job-list">' + filtered.map(j => {
    const client = clients.find(c => c.id === j.client_id);
    const person = staff.find(s => s.id === j.staff_id);
    const startD = j.started_at || '';
    const endD = j.deadline || '';
    const dates = startD ? (startD + (endD ? ' ~ ' + endD : '')) : '';
    return '<div class="job-card" onclick="openEditModal(\'' + j.id + '\')">' +
      '<div class="job-code">' + esc(j.job_code) + '</div>' +
      '<div class="job-name">' + esc(j.title) + '</div>' +
      '<div class="job-client">' + esc(client ? client.name : '-') + '</div>' +
      '<span class="badge badge-' + j.status + '">' + esc(j.status) + '</span>' +
      '<div class="job-person">' + esc(person ? person.name : '-') + '</div>' +
      '<div class="job-dates">' + esc(dates) + '</div>' +
      '</div>';
  }).join('') + '</div>';

  document.getElementById('jobList').innerHTML = html;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Dropdowns ---
function populateDropdowns() {
  const cSel = document.getElementById('fClient');
  cSel.innerHTML = '<option value="">-- 選択 --</option>' +
    clients.map(c => '<option value="' + c.id + '">' + esc(c.name) + '</option>').join('');

  const sSel = document.getElementById('fSalesPerson');
  sSel.innerHTML = '<option value="">-- 選択 --</option>' +
    staff.map(s => '<option value="' + s.id + '">' + esc(s.name) + '</option>').join('');
}

// --- Modal ---
function openCreateModal() {
  document.getElementById('modalTitle').textContent = '新規JOB';
  document.getElementById('editId').value = '';
  document.getElementById('fJobCode').value = '';
  document.getElementById('fJobName').value = '';
  document.getElementById('fStatus').value = '見積中';
  document.getElementById('fClient').value = '';
  document.getElementById('fSalesPerson').value = '';
  document.getElementById('fStartDate').value = '';
  document.getElementById('fEndDate').value = '';
  document.getElementById('fDescription').value = '';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('active');
}

function openEditModal(id) {
  const job = allJobs.find(j => j.id === id);
  if (!job) return;
  document.getElementById('modalTitle').textContent = 'JOB編集';
  document.getElementById('editId').value = job.id;
  document.getElementById('fJobCode').value = job.job_code || '';
  document.getElementById('fJobName').value = job.title || '';
  document.getElementById('fStatus').value = job.status || '見積中';
  document.getElementById('fClient').value = job.client_id || '';
  document.getElementById('fSalesPerson').value = job.staff_id || '';
  document.getElementById('fStartDate').value = job.started_at || '';
  document.getElementById('fEndDate').value = job.deadline || '';
  document.getElementById('fDescription').value = job.description || '';
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// --- CRUD ---
async function saveJob() {
  const id = document.getElementById('editId').value;
  const code = document.getElementById('fJobCode').value.trim();
  const name = document.getElementById('fJobName').value.trim();
  if (!code || !name) { showToast('JOB番号とJOB名は必須です', true); return; }

  const data = {
    job_code: code,
    title: name,
    status: document.getElementById('fStatus').value,
    client_id: document.getElementById('fClient').value || null,
    staff_id: document.getElementById('fSalesPerson').value || null,
    started_at: document.getElementById('fStartDate').value || null,
    deadline: document.getElementById('fEndDate').value || null,
    description: document.getElementById('fDescription').value || null,
  };

  try {
    let res;
    if (id) {
      res = await sb.from('jobs').update(data).eq('id', id);
    } else {
      res = await sb.from('jobs').insert(data);
    }
    if (res.error) throw res.error;
    showToast(id ? '更新しました' : '作成しました');
    closeModal();
    await refreshJobs();
  } catch (e) {
    showToast('エラー: ' + (e.message || e), true);
  }
}

async function deleteJob() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  if (!confirm('このJOBを削除しますか？')) return;
  try {
    const res = await sb.from('jobs').delete().eq('id', id);
    if (res.error) throw res.error;
    showToast('削除しました');
    closeModal();
    await refreshJobs();
  } catch (e) {
    showToast('削除エラー: ' + (e.message || e), true);
  }
}

async function refreshJobs() {
  const res = await sb.from('jobs').select('*').order('created_at', { ascending: false });
  if (!res.error) { allJobs = res.data || []; renderJobs(); }
}

// --- Toast ---
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (isError ? 'toast-error' : 'toast-success');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// --- Events ---
document.getElementById('searchInput').addEventListener('input', renderJobs);
document.getElementById('statusFilter').addEventListener('change', renderJobs);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// --- Start ---
init();
</script>
</body>
</html>
