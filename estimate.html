<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積管理 - asura Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0a0a0a; --card:#141414; --card2:#1a1a1a; --border:#1e1e1e; --border2:#333;
    --text:#e0e0e0; --sub:#888; --muted:#555;
    --accent:#ff4444; --accent2:#ee3333;
    --blue:#4488ff; --green:#44bb44; --orange:#ffa500; --purple:#aa66ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;}
  a{color:var(--accent);text-decoration:none;} a:hover{text-decoration:underline;}

  .header{display:flex;justify-content:space-between;align-items:center;padding:20px 32px;border-bottom:1px solid var(--border);}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo{color:var(--accent);font-size:28px;font-weight:900;letter-spacing:-1px;}
  .header h1{font-size:20px;font-weight:600;}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px 32px;}
  .s-card{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border);}
  .s-label{font-size:11px;color:var(--sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
  .s-val{font-size:26px;font-weight:700;}
  .s-val.red{color:var(--accent);} .s-val.blue{color:var(--blue);} .s-val.green{color:var(--green);} .s-val.orange{color:var(--orange);}

  .toolbar{display:flex;gap:10px;padding:16px 32px;align-items:center;flex-wrap:wrap;}
  .search{flex:1;min-width:180px;padding:9px 14px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;outline:none;}
  .search:focus{border-color:var(--accent);}
  select.filter{padding:9px 14px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;outline:none;}
  .btn{padding:9px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;}
  .btn-red{background:var(--accent);color:#fff;} .btn-red:hover{background:var(--accent2);}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2);} .btn-outline:hover{background:var(--card2);}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .btn-green{background:var(--green);color:#fff;} .btn-green:hover{background:#38a838;}
  .btn-blue{background:var(--blue);color:#fff;} .btn-blue:hover{background:#3377ee;}

  .content{padding:0 32px 32px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead{background:var(--card);} th{padding:10px 12px;text-align:left;color:var(--sub);font-weight:500;font-size:12px;white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);}
  .clickable{cursor:pointer;transition:background .15s;} .clickable:hover{background:var(--card);}
  .empty{text-align:center;padding:50px 20px;color:var(--sub);font-size:14px;}
  .loading{text-align:center;padding:50px 20px;color:var(--sub);}
  .amount{font-family:monospace;text-align:right;font-weight:600;}

  .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
  .b-作成中{background:rgba(136,136,136,.15);color:var(--sub);}
  .b-提出済{background:rgba(68,136,255,.15);color:var(--blue);}
  .b-承認{background:rgba(68,187,68,.15);color:var(--green);}
  .b-却下{background:rgba(255,68,68,.15);color:var(--accent);}

  /* Modal - Full screen editor */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--card2);border-radius:14px;padding:28px;width:100%;max-width:900px;margin:auto;border:1px solid var(--border2);}
  .modal h2{font-size:17px;margin-bottom:18px;}
  .fg{margin-bottom:14px;}
  .fg label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;}
  .fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;background:#0f0f0f;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;outline:none;}
  .fg input:focus,.fg select:focus{border-color:var(--accent);}
  .fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .fr4{display:grid;grid-template-columns:1fr 2fr 80px 80px 120px 120px 40px;gap:6px;align-items:end;margin-bottom:6px;}

  .section-title{font-size:13px;color:var(--accent);font-weight:600;margin:20px 0 12px;padding-top:16px;border-top:1px solid var(--border);}

  .item-header{display:grid;grid-template-columns:1fr 2fr 80px 80px 120px 120px 40px;gap:6px;padding:8px 0;font-size:11px;color:var(--sub);border-bottom:1px solid var(--border);}
  .item-row{display:grid;grid-template-columns:1fr 2fr 80px 80px 120px 120px 40px;gap:6px;padding:6px 0;align-items:center;border-bottom:1px solid var(--border);}
  .item-row input{padding:7px 8px;background:#0f0f0f;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;outline:none;width:100%;}
  .item-row input:focus{border-color:var(--accent);}
  .btn-remove{width:32px;height:32px;border:none;background:transparent;color:var(--accent);font-size:18px;cursor:pointer;border-radius:6px;}
  .btn-remove:hover{background:rgba(255,68,68,.1);}

  .totals{background:#111;border-radius:10px;padding:16px;margin-top:16px;border:1px solid rgba(68,136,255,.2);}
  .total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;}
  .total-row.grand{font-size:20px;font-weight:700;color:var(--accent);padding-top:8px;margin-top:8px;border-top:1px solid var(--border2);}

  .client-info{background:#111;border-radius:10px;padding:14px;margin-top:8px;font-size:13px;color:var(--sub);border:1px solid rgba(68,136,255,.2);}
  .client-info strong{color:var(--blue);}

  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;padding:11px;}

  .toast{position:fixed;bottom:20px;right:20px;padding:14px 24px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .toast-ok{background:#1a3a1a;color:var(--green);border:1px solid var(--green);}
  .toast-ng{background:#3a1a1a;color:var(--accent);border:1px solid var(--accent);}

  .no-table{background:var(--card);border-radius:12px;padding:40px;text-align:center;border:1px solid var(--border);}
  .no-table h3{color:var(--orange);margin-bottom:12px;}
  .no-table pre{background:#0f0f0f;border-radius:8px;padding:16px;text-align:left;font-size:12px;color:var(--sub);overflow-x:auto;margin-top:12px;max-height:300px;overflow-y:auto;}

  @media(max-width:768px){
    .header{padding:14px 16px;} .toolbar{padding:12px 16px;} .content{padding:0 16px 24px;} .summary{padding:12px 16px;}
    .fr,.fr3{grid-template-columns:1fr;}
    .item-header,.item-row,.fr4{grid-template-columns:1fr 1fr;}
    .modal{padding:20px;width:100%;max-width:none;border-radius:12px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">asura</span>
    <h1>見積管理</h1>
  </div>
  <a href="index.html" class="back-link">← ポータルに戻る</a>
</div>

<div class="summary">
  <div class="s-card"><div class="s-label">今月の見積</div><div class="s-val blue" id="smCount">-</div></div>
  <div class="s-card"><div class="s-label">提出済</div><div class="s-val orange" id="smSubmitted">-</div></div>
  <div class="s-card"><div class="s-label">承認済</div><div class="s-val green" id="smApproved">-</div></div>
  <div class="s-card"><div class="s-label">今月の見積合計</div><div class="s-val red" id="smTotal">-</div></div>
</div>

<div class="toolbar">
  <input type="text" class="search" id="searchInput" placeholder="見積番号・JOB名で検索...">
  <select class="filter" id="filterStatus">
    <option value="">全ステータス</option>
    <option value="作成中">作成中</option>
    <option value="提出済">提出済</option>
    <option value="承認">承認</option>
    <option value="却下">却下</option>
  </select>
  <button class="btn btn-red" onclick="openNewEstimate()">+ 見積作成</button>
</div>

<div class="content">
  <div id="estimateList"><div class="loading">読み込み中...</div></div>
</div>

<!-- ========== 見積作成/編集モーダル ========== -->
<div class="modal-overlay" id="estModal">
  <div class="modal">
    <h2 id="estModalTitle">見積作成</h2>
    <input type="hidden" id="eId">

    <div class="fr3">
      <div class="fg"><label>見積番号 *</label><input type="text" id="eNumber" placeholder="EST-2603-001"></div>
      <div class="fg">
        <label>JOB *</label>
        <select id="eJob" onchange="onJobSelect()"><option value="">-- JOBを選択 --</option></select>
      </div>
      <div class="fg">
        <label>ステータス</label>
        <select id="eStatus">
          <option value="作成中">作成中</option>
          <option value="提出済">提出済</option>
          <option value="承認">承認</option>
          <option value="却下">却下</option>
        </select>
      </div>
    </div>

    <div class="client-info" id="clientInfo">JOBを選択すると取引先情報が表示されます</div>

    <div class="fr">
      <div class="fg"><label>発行日</label><input type="date" id="eIssueDate"></div>
      <div class="fg"><label>有効期限</label><input type="date" id="eValidUntil"></div>
    </div>

    <!-- 明細 -->
    <div class="section-title">明細項目</div>
    <div class="item-header">
      <span>項目名</span><span>説明</span><span>数量</span><span>単位</span><span style="text-align:right">単価</span><span style="text-align:right">金額</span><span></span>
    </div>
    <div id="itemRows"></div>
    <button class="btn btn-outline btn-sm" onclick="addItemRow()" style="margin-top:8px">+ 明細追加</button>

    <!-- 合計 -->
    <div class="totals">
      <div class="total-row"><span>小計</span><span id="tSubtotal">¥0</span></div>
      <div class="total-row">
        <span>消費税
          <select id="eTaxRate" onchange="recalcTotals()" style="padding:2px 6px;background:#0f0f0f;border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:12px;">
            <option value="0.10">10%</option>
            <option value="0.08">8%（軽減）</option>
            <option value="0">なし</option>
          </select>
        </span>
        <span id="tTax">¥0</span>
      </div>
      <div class="total-row grand"><span>合計（税込）</span><span id="tTotal">¥0</span></div>
    </div>

    <div class="fg" style="margin-top:16px"><label>備考</label><textarea id="eNotes" placeholder="備考" style="width:100%;height:60px;padding:9px 12px;background:#0f0f0f;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;outline:none;resize:vertical;"></textarea></div>

    <div class="modal-actions">
      <button class="btn btn-red" onclick="saveEstimate()">保存</button>
      <button class="btn btn-outline" onclick="closeEstModal()">キャンセル</button>
      <button class="btn btn-outline" id="eBtnDel" style="display:none;color:var(--accent);border-color:var(--accent);" onclick="deleteEstimate()">削除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ymtojnmkvypbhmeqaszm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltdG9qbm1rdnlwYmhtZXFhc3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MDI0NzIsImV4cCI6MjA4NDk3ODQ3Mn0.X88gOaFprlNrbRD14C26r-fWYu7KSGZXu9I4bC6p8CU';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let estimates = [], jobs = [], partners = [], items = [];
let tableExists = true;

// ========== INIT ==========
async function init() {
  try {
    // Load jobs and partners first (always exist)
    const [jobRes, partRes] = await Promise.all([
      sb.from('jobs').select('id, job_code, title, client_id').order('created_at', { ascending: false }),
      sb.from('partners').select('id, name, closing_day, payment_months_later, payment_day, withholding_tax, invoice_number').eq('is_client', true)
    ]);
    jobs = jobRes.data || [];
    partners = partRes.data || [];

    // Fill JOB dropdown
    const jobSel = document.getElementById('eJob');
    jobSel.innerHTML = '<option value="">-- JOBを選択 --</option>' + jobs.map(j => '<option value="' + j.id + '">' + esc(j.job_code) + ' - ' + esc(j.title) + '</option>').join('');

    // Try loading estimates
    const estRes = await sb.from('estimates').select('*, jobs:job_id(job_code, title), partners:client_id(name)').order('created_at', { ascending: false });
    if (estRes.error) {
      if (estRes.error.message.includes('estimates')) {
        tableExists = false;
        showNoTable();
        return;
      }
      throw estRes.error;
    }
    estimates = estRes.data || [];
    renderEstimates();
    renderSummary();
  } catch(e) {
    console.error(e);
    document.getElementById('estimateList').innerHTML = '<div class="empty" style="color:var(--accent)">読み込みエラー: ' + (e.message||e) + '</div>';
  }
}

function showNoTable() {
  const sql = `-- estimates テーブル
CREATE TABLE estimates (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  estimate_number text NOT NULL,
  job_id uuid REFERENCES jobs(id),
  client_id uuid REFERENCES partners(id),
  issue_date date DEFAULT CURRENT_DATE,
  valid_until date,
  status text DEFAULT '作成中',
  subtotal numeric DEFAULT 0,
  tax_rate numeric DEFAULT 0.10,
  tax_amount numeric DEFAULT 0,
  total numeric DEFAULT 0,
  notes text,
  created_at timestamptz DEFAULT now(),
  updated_at timestamptz DEFAULT now()
);

-- estimate_items テーブル
CREATE TABLE estimate_items (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  estimate_id uuid REFERENCES estimates(id) ON DELETE CASCADE,
  item_name text NOT NULL,
  description text,
  quantity numeric DEFAULT 1,
  unit text DEFAULT '式',
  unit_price numeric DEFAULT 0,
  amount numeric DEFAULT 0,
  sort_order int DEFAULT 0,
  created_at timestamptz DEFAULT now()
);

-- RLS ポリシー
ALTER TABLE estimates ENABLE ROW LEVEL SECURITY;
ALTER TABLE estimate_items ENABLE ROW LEVEL SECURITY;
CREATE POLICY "anon_all_estimates" ON estimates FOR ALL TO anon USING (true) WITH CHECK (true);
CREATE POLICY "anon_all_estimate_items" ON estimate_items FOR ALL TO anon USING (true) WITH CHECK (true);`;

  document.getElementById('estimateList').innerHTML = '<div class="no-table">'
    + '<h3>⚠ estimatesテーブルが未作成です</h3>'
    + '<p style="color:var(--sub);margin-bottom:12px">以下のSQLをSupabase SQL Editorで実行してください</p>'
    + '<pre>' + esc(sql) + '</pre>'
    + '<button class="btn btn-blue" style="margin-top:16px" onclick="navigator.clipboard.writeText(document.querySelector(\'.no-table pre\').textContent);toast(\'SQLをコピーしました\')">SQLをコピー</button>'
    + '</div>';
}

// ========== SUMMARY ==========
function renderSummary() {
  const now = new Date();
  const thisMonth = estimates.filter(e => {
    const d = new Date(e.created_at);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  document.getElementById('smCount').textContent = thisMonth.length + '件';
  document.getElementById('smSubmitted').textContent = estimates.filter(e => e.status === '提出済').length + '件';
  document.getElementById('smApproved').textContent = estimates.filter(e => e.status === '承認').length + '件';
  const total = thisMonth.reduce((s, e) => s + Number(e.total || 0), 0);
  document.getElementById('smTotal').textContent = '¥' + total.toLocaleString();
}

// ========== RENDER ==========
function renderEstimates() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  let list = estimates.filter(e => {
    const search = !q || (e.estimate_number||'').toLowerCase().includes(q) || (e.jobs?.title||'').toLowerCase().includes(q);
    const status = !fs || e.status === fs;
    return search && status;
  });

  if (!list.length) { document.getElementById('estimateList').innerHTML = '<div class="empty">見積データがありません</div>'; return; }

  let html = '<table><thead><tr><th>見積番号</th><th>JOB</th><th>クライアント</th><th>発行日</th><th style="text-align:right">合計金額</th><th>ステータス</th></tr></thead><tbody>';
  list.forEach(e => {
    html += '<tr class="clickable" onclick="openEditEstimate(\'' + e.id + '\')">'
      + '<td style="font-family:monospace;color:var(--purple);font-weight:600">' + esc(e.estimate_number) + '</td>'
      + '<td>' + esc(e.jobs?.job_code||'-') + ' ' + esc(e.jobs?.title||'') + '</td>'
      + '<td>' + esc(e.partners?.name||'-') + '</td>'
      + '<td>' + esc(e.issue_date||'-') + '</td>'
      + '<td class="amount" style="color:var(--accent)">¥' + Number(e.total||0).toLocaleString() + '</td>'
      + '<td><span class="badge b-' + e.status + '">' + esc(e.status) + '</span></td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('estimateList').innerHTML = html;
}

// ========== JOB SELECT ==========
function onJobSelect() {
  const jobId = document.getElementById('eJob').value;
  if (!jobId) {
    document.getElementById('clientInfo').innerHTML = 'JOBを選択すると取引先情報が表示されます';
    return;
  }
  const job = jobs.find(j => j.id === jobId);
  if (!job || !job.client_id) {
    document.getElementById('clientInfo').innerHTML = '<span style="color:var(--orange)">このJOBにクライアントが設定されていません</span>';
    return;
  }
  const client = partners.find(p => p.id === job.client_id);
  if (!client) {
    document.getElementById('clientInfo').innerHTML = '<span style="color:var(--orange)">クライアント情報が見つかりません</span>';
    return;
  }

  const closing = client.closing_day ? (client.closing_day === '末' ? '末日' : client.closing_day + '日') : '-';
  const monthLater = client.payment_months_later != null ? ['当月','翌月','翌々月','3ヶ月後'][client.payment_months_later] : '-';
  const payDay = client.payment_day ? (client.payment_day === '末' ? '末日' : client.payment_day + '日') : '-';
  const wh = client.withholding_tax ? '<span class="badge b-yes" style="margin-left:8px">源泉徴収対象</span>' : '';

  document.getElementById('clientInfo').innerHTML =
    '<strong>' + esc(client.name) + '</strong>' + wh + '<br>'
    + '<span style="font-size:12px">支払サイト: ' + closing + '締め → ' + monthLater + payDay + '払い</span>'
    + (client.invoice_number ? '<br><span style="font-size:12px">インボイス: ' + esc(client.invoice_number) + '</span>' : '');
}

// ========== ITEM ROWS ==========
let itemCounter = 0;
function addItemRow(data) {
  itemCounter++;
  const id = 'item_' + itemCounter;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = id;
  div.innerHTML =
    '<input type="text" placeholder="項目名" value="' + esc(data?.item_name||'') + '" data-field="item_name">'
    + '<input type="text" placeholder="説明" value="' + esc(data?.description||'') + '" data-field="description">'
    + '<input type="number" placeholder="1" value="' + (data?.quantity||1) + '" data-field="quantity" oninput="calcRow(this)">'
    + '<input type="text" placeholder="式" value="' + esc(data?.unit||'式') + '" data-field="unit">'
    + '<input type="number" placeholder="0" value="' + (data?.unit_price||'') + '" data-field="unit_price" oninput="calcRow(this)" style="text-align:right">'
    + '<input type="number" placeholder="0" value="' + (data?.amount||'') + '" data-field="amount" style="text-align:right;background:#1a1a1a;" readonly>'
    + '<button class="btn-remove" onclick="removeRow(\'' + id + '\')">✕</button>';
  if (data?.id) div.dataset.dbId = data.id;
  document.getElementById('itemRows').appendChild(div);
  return div;
}

function removeRow(id) {
  document.getElementById(id)?.remove();
  recalcTotals();
}

function calcRow(input) {
  const row = input.closest('.item-row');
  const qty = Number(row.querySelector('[data-field="quantity"]').value) || 0;
  const price = Number(row.querySelector('[data-field="unit_price"]').value) || 0;
  row.querySelector('[data-field="amount"]').value = qty * price;
  recalcTotals();
}

function recalcTotals() {
  const rows = document.querySelectorAll('.item-row');
  let subtotal = 0;
  rows.forEach(r => { subtotal += Number(r.querySelector('[data-field="amount"]').value) || 0; });
  const taxRate = Number(document.getElementById('eTaxRate').value);
  const tax = Math.floor(subtotal * taxRate);
  const total = subtotal + tax;

  document.getElementById('tSubtotal').textContent = '¥' + subtotal.toLocaleString();
  document.getElementById('tTax').textContent = '¥' + tax.toLocaleString();
  document.getElementById('tTotal').textContent = '¥' + total.toLocaleString();
}

// ========== MODAL ==========
function openNewEstimate() {
  if (!tableExists) { toast('estimatesテーブルを先に作成してください', true); return; }
  document.getElementById('estModalTitle').textContent = '見積作成';
  document.getElementById('eId').value = '';
  // Auto-generate estimate number
  const now = new Date();
  const num = String(estimates.length + 1).padStart(3, '0');
  document.getElementById('eNumber').value = 'EST-' + String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0') + '-' + num;
  document.getElementById('eJob').value = '';
  document.getElementById('eStatus').value = '作成中';
  document.getElementById('eIssueDate').value = now.toISOString().slice(0,10);
  const valid = new Date(now); valid.setMonth(valid.getMonth() + 1);
  document.getElementById('eValidUntil').value = valid.toISOString().slice(0,10);
  document.getElementById('eNotes').value = '';
  document.getElementById('eTaxRate').value = '0.10';
  document.getElementById('clientInfo').innerHTML = 'JOBを選択すると取引先情報が表示されます';
  document.getElementById('itemRows').innerHTML = '';
  document.getElementById('eBtnDel').style.display = 'none';
  addItemRow(); // Start with one empty row
  recalcTotals();
  document.getElementById('estModal').classList.add('active');
}

async function openEditEstimate(id) {
  const est = estimates.find(e => e.id === id);
  if (!est) return;
  document.getElementById('estModalTitle').textContent = '見積編集';
  document.getElementById('eId').value = est.id;
  document.getElementById('eNumber').value = est.estimate_number || '';
  document.getElementById('eJob').value = est.job_id || '';
  document.getElementById('eStatus').value = est.status || '作成中';
  document.getElementById('eIssueDate').value = est.issue_date || '';
  document.getElementById('eValidUntil').value = est.valid_until || '';
  document.getElementById('eNotes').value = est.notes || '';
  document.getElementById('eTaxRate').value = String(est.tax_rate || 0.10);
  document.getElementById('eBtnDel').style.display = 'block';
  onJobSelect();

  // Load items
  document.getElementById('itemRows').innerHTML = '';
  const itemRes = await sb.from('estimate_items').select('*').eq('estimate_id', id).order('sort_order');
  if (itemRes.data && itemRes.data.length) {
    itemRes.data.forEach(item => addItemRow(item));
  } else {
    addItemRow();
  }
  recalcTotals();
  document.getElementById('estModal').classList.add('active');
}

function closeEstModal() { document.getElementById('estModal').classList.remove('active'); }

// ========== CRUD ==========
async function saveEstimate() {
  const id = document.getElementById('eId').value;
  const number = document.getElementById('eNumber').value.trim();
  const jobId = document.getElementById('eJob').value;
  if (!number) { toast('見積番号は必須です', true); return; }

  // Gather items
  const rows = document.querySelectorAll('.item-row');
  const itemsData = [];
  rows.forEach((r, i) => {
    const name = r.querySelector('[data-field="item_name"]').value.trim();
    if (!name) return;
    itemsData.push({
      item_name: name,
      description: r.querySelector('[data-field="description"]').value.trim() || null,
      quantity: Number(r.querySelector('[data-field="quantity"]').value) || 1,
      unit: r.querySelector('[data-field="unit"]').value.trim() || '式',
      unit_price: Number(r.querySelector('[data-field="unit_price"]').value) || 0,
      amount: Number(r.querySelector('[data-field="amount"]').value) || 0,
      sort_order: i
    });
  });

  const subtotal = itemsData.reduce((s, it) => s + it.amount, 0);
  const taxRate = Number(document.getElementById('eTaxRate').value);
  const taxAmount = Math.floor(subtotal * taxRate);
  const total = subtotal + taxAmount;

  // Get client_id from job
  const job = jobs.find(j => j.id === jobId);
  const clientId = job?.client_id || null;

  const estData = {
    estimate_number: number,
    job_id: jobId || null,
    client_id: clientId,
    issue_date: document.getElementById('eIssueDate').value || null,
    valid_until: document.getElementById('eValidUntil').value || null,
    status: document.getElementById('eStatus').value,
    subtotal, tax_rate: taxRate, tax_amount: taxAmount, total,
    notes: document.getElementById('eNotes').value.trim() || null,
    updated_at: new Date().toISOString()
  };

  try {
    let estId = id;
    if (id) {
      const res = await sb.from('estimates').update(estData).eq('id', id);
      if (res.error) throw res.error;
    } else {
      const res = await sb.from('estimates').insert(estData).select('id').single();
      if (res.error) throw res.error;
      estId = res.data.id;
    }

    // Delete old items and insert new
    await sb.from('estimate_items').delete().eq('estimate_id', estId);
    if (itemsData.length) {
      const withId = itemsData.map(it => ({ ...it, estimate_id: estId }));
      const insRes = await sb.from('estimate_items').insert(withId);
      if (insRes.error) throw insRes.error;
    }

    toast(id ? '更新しました' : '保存しました');
    closeEstModal();
    await reload();
  } catch(e) { toast('エラー: ' + (e.message||e), true); }
}

async function deleteEstimate() {
  const id = document.getElementById('eId').value;
  if (!id || !confirm('この見積を削除しますか？')) return;
  try {
    const res = await sb.from('estimates').delete().eq('id', id);
    if (res.error) throw res.error;
    toast('削除しました');
    closeEstModal();
    await reload();
  } catch(e) { toast('削除エラー: ' + (e.message||e), true); }
}

async function reload() {
  const res = await sb.from('estimates').select('*, jobs:job_id(job_code, title), partners:client_id(name)').order('created_at', { ascending: false });
  if (!res.error) { estimates = res.data || []; renderEstimates(); renderSummary(); }
}

// ========== EVENTS ==========
document.getElementById('searchInput').addEventListener('input', renderEstimates);
document.getElementById('filterStatus').addEventListener('change', renderEstimates);
document.getElementById('estModal').addEventListener('click', function(e) { if (e.target === this) closeEstModal(); });

// ========== UTIL ==========
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (err?'toast-ng':'toast-ok');
  setTimeout(()=>{ t.className='toast'; }, 3000);
}

// ========== START ==========
init();
</script>
